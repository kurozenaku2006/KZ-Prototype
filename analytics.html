<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KZ ANALYTICS</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .glow{
      box-shadow:
      0 0 15px rgba(34,211,238,.25),
      0 0 35px rgba(16,185,129,.15);
    }

    canvas{
      width:100% !important;
      height:350px !important;
    }

  </style>

</head>

<body>

<div
  x-data="analyticsApp()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-8 glow">

    <div>

      <h1 class="logo-font text-3xl md:text-5xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KZ ANALYTICS
      </h1>

      <p class="text-gray-400 text-sm mt-2">
        REAL-TIME BUSINESS INTELLIGENCE
      </p>

    </div>

    <div class="flex gap-3">

      <button
        onclick="window.location.href='admin.html'"
        class="glass px-5 py-3 rounded-2xl hover:bg-white/10">

        ← Admin

      </button>

      <button
        @click="logout()"
        class="bg-gradient-to-r from-red-500 to-pink-500 px-5 py-3 rounded-2xl font-bold">

        Logout

      </button>

    </div>

  </div>

  <!-- KPI STATS -->

  <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">TOTAL CLAIMS</p>
      <h2 class="text-3xl font-black mt-2" x-text="claims.length"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">APPROVED</p>
      <h2 class="text-3xl font-black mt-2 text-emerald-300" x-text="approvedClaims"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REJECTED</p>
      <h2 class="text-3xl font-black mt-2 text-red-300" x-text="rejectedClaims"></h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">REVENUE</p>
      <h2 class="text-3xl font-black mt-2 text-cyan-300">
        ₹<span x-text="revenue"></span>
      </h2>
    </div>

    <div class="glass rounded-3xl p-5 glow">
      <p class="text-gray-400 text-sm">TOTAL PRODUCTS</p>
      <h2 class="text-3xl font-black mt-2 text-orange-300" x-text="products.length"></h2>
    </div>

  </div>

  <!-- CHARTS -->

  <div class="grid lg:grid-cols-2 gap-6">

    <!-- CLAIM STATUS -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl font-black mb-5">
        Claim Status Distribution
      </h2>

      <canvas id="claimsChart"></canvas>

    </div>

    <!-- CATEGORY CHART -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl font-black mb-5">
        Product Categories
      </h2>

      <canvas id="categoryChart"></canvas>

    </div>

    <!-- REVENUE CHART -->

    <div class="glass rounded-3xl p-6 glow lg:col-span-2">

      <h2 class="text-2xl font-black mb-5">
        Revenue Analytics
      </h2>

      <canvas id="revenueChart"></canvas>

    </div>

    <!-- TOP PRODUCTS -->

    <div class="glass rounded-3xl p-6 glow lg:col-span-2">

      <h2 class="text-2xl font-black mb-5">
        Top Claimed Products
      </h2>

      <canvas id="productsChart"></canvas>

    </div>

  </div>

</div>

<script>

function analyticsApp(){

  return {

    db:null,

    claims:[],
    products:[],

    approvedClaims:0,
    rejectedClaims:0,
    revenue:0,

    claimsChart:null,
    categoryChart:null,
    revenueChart:null,
    productsChart:null,

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',
        authDomain:'kurozenaku-gundam-store.firebaseapp.com',
        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){
        firebase.initializeApp(firebaseConfig);
      }

      firebase.auth().onAuthStateChanged(user => {

        if(!user){

          window.location.href='login.html';
          return;

        }

      });

      this.db = firebase.firestore();

      this.loadData();

    },

    async loadData(){

      const claimsSnapshot =
      await this.db.collection('claims').get();

      const productsSnapshot =
      await this.db.collection('products').get();

      this.claims =
      claimsSnapshot.docs.map(doc => ({
        id:doc.id,
        ...doc.data()
      }));

      this.products =
      productsSnapshot.docs.map(doc => ({
        id:doc.id,
        ...doc.data()
      }));

      this.calculateStats();

      this.renderCharts();

    },

    calculateStats(){

      this.approvedClaims =
      this.claims.filter(c => c.status === 'approved').length;

      this.rejectedClaims =
      this.claims.filter(c => c.status === 'rejected').length;

      this.revenue =
      this.claims
      .filter(c => c.status === 'approved')
      .reduce((sum,c)=> sum + Number(c.price || 0),0);

    },

    renderCharts(){

      this.renderClaimsChart();
      this.renderCategoryChart();
      this.renderRevenueChart();
      this.renderProductsChart();

    },

    renderClaimsChart(){

      const ctx =
      document.getElementById('claimsChart');

      new Chart(ctx,{

        type:'doughnut',

        data:{
          labels:['Pending','Approved','Rejected'],
          datasets:[{
            data:[
              this.claims.filter(c=>c.status==='pending').length,
              this.approvedClaims,
              this.rejectedClaims
            ],
            backgroundColor:[
              '#facc15',
              '#10b981',
              '#ef4444'
            ]
          }]
        },

        options:{
          responsive:true,
          plugins:{
            legend:{
              labels:{
                color:'white'
              }
            }
          }
        }

      });

    },

    renderCategoryChart(){

      const categories = {};

      this.products.forEach(product => {

        const category =
        product.category || 'Unknown';

        categories[category] =
        (categories[category] || 0) + 1;

      });

      const ctx =
      document.getElementById('categoryChart');

      new Chart(ctx,{

        type:'pie',

        data:{
          labels:Object.keys(categories),
          datasets:[{
            data:Object.values(categories),
            backgroundColor:[
              '#06b6d4',
              '#10b981',
              '#8b5cf6',
              '#f97316',
              '#ef4444'
            ]
          }]
        },

        options:{
          responsive:true,
          plugins:{
            legend:{
              labels:{
                color:'white'
              }
            }
          }
        }

      });

    },

    renderRevenueChart(){

      const approved =
      this.claims.filter(c => c.status === 'approved');

      const revenueData = {};

      approved.forEach(claim => {

        const date =
        claim.createdAt?.toDate
        ? claim.createdAt.toDate().toLocaleDateString()
        : 'Unknown';

        revenueData[date] =
        (revenueData[date] || 0)
        + Number(claim.price || 0);

      });

      const ctx =
      document.getElementById('revenueChart');

      new Chart(ctx,{

        type:'line',

        data:{
          labels:Object.keys(revenueData),
          datasets:[{
            label:'Revenue',
            data:Object.values(revenueData),
            borderColor:'#06b6d4',
            backgroundColor:'rgba(6,182,212,.2)',
            tension:.4,
            fill:true
          }]
        },

        options:{
          responsive:true,
          plugins:{
            legend:{
              labels:{
                color:'white'
              }
            }
          },
          scales:{
            x:{
              ticks:{
                color:'white'
              }
            },
            y:{
              ticks:{
                color:'white'
              }
            }
          }
        }

      });

    },

    renderProductsChart(){

      const counts = {};

      this.claims.forEach(claim => {

        const product =
        claim.productName || 'Unknown';

        counts[product] =
        (counts[product] || 0) + 1;

      });

      const sorted =
      Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,7);

      const ctx =
      document.getElementById('productsChart');

      new Chart(ctx,{

        type:'bar',

        data:{
          labels:sorted.map(i=>i[0]),
          datasets:[{
            label:'Claims',
            data:sorted.map(i=>i[1]),
            backgroundColor:'#10b981'
          }]
        },

        options:{
          responsive:true,
          plugins:{
            legend:{
              labels:{
                color:'white'
              }
            }
          },
          scales:{
            x:{
              ticks:{
                color:'white'
              }
            },
            y:{
              ticks:{
                color:'white'
              }
            }
          }
        }

      });

    },

    async logout(){

      await firebase.auth().signOut();

      window.location.href='login.html';

    }

  }

}

</script>

</body>
</html>
