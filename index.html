<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KUROZENAKU</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:
      radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
      color:white;
      overflow-x:hidden;
    }

    .logo-font{
      font-family:'Orbitron',sans-serif;
      letter-spacing:.12em;
    }

    .glass{
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
    }

    .product-card{
      transition:.25s ease;
    }

    .product-card:hover{
      transform:translateY(-8px);
      box-shadow:
      0 0 40px rgba(0,255,255,.18);
    }

    .drawer{
      transition:all .3s ease;
    }

    @keyframes pulseGlow{

      0%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

      50%{
        box-shadow:0 0 35px rgba(20,184,166,1);
      }

      100%{
        box-shadow:0 0 10px rgba(20,184,166,.4);
      }

    }

    .glow-button{
      animation:pulseGlow 2s infinite ease-in-out;
    }

    .glow-button:hover{
      filter:brightness(1.2);
      transform:translateY(-2px) scale(1.03);
    }

  </style>

</head>

<body>

<div
  x-data="app()"
  x-init="init()"
  class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->

  <div class="glass rounded-3xl p-5 flex justify-between items-center mb-6 shadow-2xl">

    <div>

      <h1 class="logo-font text-3xl md:text-4xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        KZ 
      </h1>

      <p class="text-gray-400 text-sm mt-1">
         Gundam Catalog
      </p>

    </div>

    <button
      @click="menuOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

      ☰ Menu

    </button>

  </div>

  <!-- SEARCH -->

  <div class="glass rounded-3xl p-3 flex gap-3 mb-8 shadow-xl">

    <button
      @click="filterOpen=true"
      class="glass px-5 py-3 rounded-2xl hover:bg-white/10 active:scale-95 transition-all duration-300">

      ☰

    </button>

    <input
      x-model="search"
      placeholder="Search Gundam kits..."
      class="flex-1 bg-transparent outline-none text-white placeholder:text-gray-400 px-2">

  </div>

  <!-- FILTER OVERLAY -->

  <div
    x-show="filterOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="filterOpen=false">
  </div>

  <!-- FILTER DRAWER -->

  <div
    x-show="filterOpen"
    x-transition
    class="drawer fixed top-0 left-0 h-full w-72 glass z-50 p-6 border-r border-white/10">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Categories
      </h2>

      <button
        @click="filterOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10">

        ✕

      </button>

    </div>

    <template x-for="c in ['ALL','HG','MG','RG','PG','SD']">

      <button
        @click="category=c; filterOpen=false"
        class="w-full text-left glass p-4 rounded-2xl mb-3 hover:bg-white/10 active:scale-95 transition-all duration-300">

        <span x-text="c"></span>

      </button>

    </template>

  </div>

  <!-- MENU OVERLAY -->

  <div
    x-show="menuOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/70 z-40"
    @click="menuOpen=false">
  </div>

  <!-- MENU DRAWER -->

  <div
    x-show="menuOpen"
    x-transition
    class="drawer fixed top-0 right-0 h-full w-80 glass z-50 p-6 border-l border-white/10">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-2xl font-bold">
        Menu
      </h2>

      <button
        @click="menuOpen=false"
        class="glass px-3 py-2 rounded-xl hover:bg-white/10">

        ✕

      </button>

    </div>

    <div class="space-y-3">

      <button
        @click="menuOpen=false"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        🏠 Home

      </button>

      <button
        @click="openClaimsPanel()"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        📦 Claims

      </button>

      <button
        @click="openWishlistPanel()"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        ⭐ Wishlist

      </button>

      <button
        @click="adminLoginOpen=true"
        class="w-full glass p-4 rounded-2xl text-left hover:bg-white/10">

        🔐 Admin Login

      </button>

    </div>

  </div>

  <!-- PRODUCTS -->

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">

    <template x-for="p in filteredProducts()" :key="p.id">

      <div class="product-card glass rounded-3xl p-4 shadow-2xl">

        <div class="bg-black/20 rounded-2xl overflow-hidden mb-4">

          <img
            :src="p.image"
            class="h-44 w-full object-contain p-4">

        </div>

        <h2
          class="font-bold text-lg mb-2"
          x-text="p.name">
        </h2>

        <div class="flex justify-between items-center mb-3">

          <p class="text-cyan-300 text-2xl font-black">

            ₹<span x-text="p.price"></span>

          </p>

          <div class="text-xs text-gray-400">

            <span
              x-show="p.stock > 1"
              x-text="p.stock + ' left'">
            </span>

            <span x-show="p.stock === 1">
              Only 1 left
            </span>

            <span x-show="p.stock <= 0">
              Sold Out
            </span>

          </div>

        </div>

        <button
          @click="claimProduct(p)"
          :disabled="pending[p.id] || p.stock <= 0"
          class="glow-button bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-4 rounded-2xl text-white font-black uppercase tracking-wider w-full disabled:opacity-50">

          <span
            x-text="
              pending[p.id]
              ? 'CLAIMING...'
              : (
                p.stock <= 0
                ? 'RESERVED'
                : '⚡ CLAIM'
              )
            ">
          </span>

        </button>

      </div>

    </template>

  </div>

  <!-- CLAIM MODAL -->

  <div
    x-show="claimModal"
    x-transition.opacity
    class="fixed inset-0 bg-black/80 z-[90]"
    @click="claimModal=false">
  </div>

  <div
    x-show="claimModal"
    x-transition
    class="fixed inset-0 z-[100] flex items-center justify-center p-4">

    <div
      @click.stop
      class="glass rounded-3xl p-6 w-full max-w-2xl border border-cyan-500/20 shadow-[0_0_50px_rgba(0,255,255,.2)]">

      <div class="flex justify-between items-center mb-6">

        <div>

          <h2 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
            CLAIM KIT
          </h2>

          <p class="text-gray-400 text-sm mt-1">
            Collector Information
          </p>

        </div>

        <button
          @click="claimModal=false"
          class="glass px-3 py-2 rounded-xl">

          ✕

        </button>

      </div>

      <div class="grid md:grid-cols-2 gap-4">

        <input
          x-model="claimForm.name"
          placeholder="Full Name"
          class="glass rounded-2xl p-4 bg-transparent">

        <input
          x-model="claimForm.contact"
          placeholder="Instagram / Discord / WhatsApp"
          class="glass rounded-2xl p-4 bg-transparent">

        <textarea
          x-model="claimForm.address"
          placeholder="Delivery Address"
          class="glass rounded-2xl p-4 bg-transparent md:col-span-2 min-h-[120px] resize-none"></textarea>

        <textarea
          x-model="claimForm.note"
          placeholder="Special requests / preferred courier / sealed box preference"
          class="glass rounded-2xl p-4 bg-transparent md:col-span-2 min-h-[100px] resize-none"></textarea>

      </div>

      <div class="flex gap-3 mt-6">

        <button
          @click="submitClaim()"
          :disabled="claimLoading"
          class="flex-1 glow-button bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-4 rounded-2xl font-black uppercase tracking-wider disabled:opacity-50">

          <span
            x-text="
              claimLoading
              ? 'CLAIMING...'
              : '⚡ CONFIRM CLAIM'
            ">
          </span>

        </button>

        <button
          @click="claimModal=false"
          class="glass px-6 py-4 rounded-2xl hover:bg-white/10">

          CANCEL

        </button>

      </div>

    </div>

  </div>

  <!-- ADMIN LOGIN OVERLAY -->

  <div
    x-show="adminLoginOpen"
    x-transition.opacity
    class="fixed inset-0 bg-black/80 z-[90]"
    @click="adminLoginOpen=false">
  </div>

  <!-- ADMIN LOGIN MODAL -->

  <div
    x-show="adminLoginOpen"
    x-transition
    class="fixed inset-0 z-[100] flex items-center justify-center p-4">

    <div
      @click.stop
      class="glass rounded-3xl p-6 w-full max-w-md border border-cyan-500/20 shadow-[0_0_50px_rgba(0,255,255,.2)]">

      <div class="flex justify-between items-center mb-6">

        <div>

          <h2 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
            ADMIN ACCESS
          </h2>

          <p class="text-gray-400 text-sm mt-1">
            Secure Dashboard Login
          </p>

        </div>

        <button
          @click="adminLoginOpen=false"
          class="glass px-3 py-2 rounded-xl">

          ✕

        </button>

      </div>

      <input
        type="password"
        x-model="adminPasscode"
        placeholder="Enter Admin Passcode"
        class="w-full glass rounded-2xl p-4 bg-transparent outline-none placeholder:text-gray-500 mb-5">

      <div class="flex gap-3">

        <button
          @click="adminLogin()"
          class="flex-1 glow-button bg-gradient-to-r from-cyan-500 to-emerald-500 px-6 py-4 rounded-2xl font-black uppercase tracking-wider">

          ENTER DASHBOARD

        </button>

        <button
          @click="adminLoginOpen=false"
          class="glass px-6 py-4 rounded-2xl hover:bg-white/10">

          CANCEL

        </button>

      </div>

    </div>

  </div>

</div>

<script>

function app(){

  return {

    menuOpen:false,
    filterOpen:false,

    search:'',
    category:'ALL',

    products:[],

    pending:{},

    claimModal:false,

    selectedProduct:null,

    claimLoading:false,

    adminLoginOpen:false,

    adminPasscode:'',

    claimForm:{
      name:'',
      contact:'',
      address:'',
      note:''
    },

    init(){

      const firebaseConfig = {

        apiKey:'AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg',

        authDomain:'kurozenaku-gundam-store.firebaseapp.com',

        projectId:'kurozenaku-gundam-store'

      };

      if(!firebase.apps.length){

        firebase.initializeApp(firebaseConfig);

      }

      const db = firebase.firestore();

      db.collection('products')
      .onSnapshot(snapshot => {

        this.products = snapshot.docs.map(doc => ({
          id:doc.id,
          ...doc.data()
        }));

      });

    },

    filteredProducts(){

      return this.products.filter(p =>

        (p.name || '')
        .toLowerCase()
        .includes(this.search.toLowerCase())

        &&

        (
          this.category === 'ALL'
          ||
          p.category === this.category
        )

      );

    },

    claimProduct(p){

      if(this.pending[p.id] || p.stock <= 0){
        return;
      }

      this.selectedProduct = p;

      this.claimForm = {

        name:'',
        contact:'',
        address:'',
        note:''

      };

      this.claimModal = true;

    },

    async submitClaim(){

      if(
        !this.claimForm.name ||
        !this.claimForm.contact ||
        !this.claimForm.address
      ){

        return alert('Please fill required fields');

      }

      const p = this.selectedProduct;

      this.claimLoading = true;

      this.pending[p.id] = true;

      try{

        const db = firebase.firestore();

        await db.collection('claims').add({

          productId:p.id,

          productName:p.name,

          price:p.price,

          customerName:this.claimForm.name,

          contact:this.claimForm.contact,

          address:this.claimForm.address,

          note:this.claimForm.note || '',

          status:'pending',

          createdAt:new Date(),
          updatedAt:new Date()

        });

        this.claimModal = false;

        this.claimLoading = false;

        this.pending[p.id] = false;

        alert('Claim submitted successfully');

      }

      catch(error){

        console.error(error);

        alert('Claim failed');

        this.claimLoading = false;

        this.pending[p.id] = false;

      }

    },

    openClaimsPanel(){

      this.menuOpen = false;

      alert('Customer claims panel coming next');

    },

    openWishlistPanel(){

      this.menuOpen = false;

      alert('Wishlist system coming next');

    },

    adminLogin(){

      const correctPasscode =
      'kurozenakuadmin';

      if(
        this.adminPasscode === correctPasscode
      ){

        window.location.href =
        'admin.html';

        return;

      }

      alert('Wrong passcode');

    }

  }

}

</script>

</body>
</html>
