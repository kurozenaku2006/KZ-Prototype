<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KZ ADMIN LOGIN</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top,#0f172a 0%,#020617 50%,#000000 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.glass{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
}

.logo-font{
  font-family:'Orbitron',sans-serif;
}

</style>

</head>

<body>

<div class="glass w-full max-w-md rounded-3xl p-8">

  <h1 class="logo-font text-4xl font-black text-center bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
    KZ ADMIN
  </h1>

  <p class="text-center text-gray-400 mt-3">
    Secure Admin Login
  </p>

  <div class="space-y-4 mt-8">

    <input
      id="email"
      type="email"
      placeholder="Admin Email"
      class="w-full glass rounded-2xl p-4 bg-transparent outline-none">

    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full glass rounded-2xl p-4 bg-transparent outline-none">

    <button
      onclick="login()"
      class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 p-4 rounded-2xl font-bold hover:brightness-125">

      LOGIN

    </button>

  </div>

</div>

<script>

const firebaseConfig = {

 apiKey: "AIzaSyByLURDPjEbLepc3Wz3O1MAYYLXSeu04Zg",
  authDomain: "kurozenaku-gundam-store.firebaseapp.com",
  projectId: "kurozenaku-gundam-store"
  
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

auth.onAuthStateChanged(user => {

  if(user){
    window.location.href = 'admin.html';
  }

});

async function login(){

  const email =
  document.getElementById('email').value;

  const password =
  document.getElementById('password').value;

  try{

    await auth.signInWithEmailAndPassword(
      email,
      password
    );

    window.location.href = 'admin.html';

  }

  catch(error){

    alert(error.message);

  }

}

</script>

</body>
</html>
